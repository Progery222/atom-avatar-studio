services:
  worker:
    image: 3d-avatar-generate-worker:latest
    container_name: aura-dynamics-worker
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura-dynamics-app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      - worker
    restart: unless-stopped
