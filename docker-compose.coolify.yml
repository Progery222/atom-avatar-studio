# Coolify deployment for atom-avatar-studio (app + internal MinIO; no Tailscale sidecar).
# Public access via Cloudflare Tunnel: avatar.atom-farm.com -> localhost:8093.
# MinIO stays internal (no published ports); the app serves files via /api/files/<key>.
# The Python worker/ is intentionally not deployed (matches docker-compose.prod.yml).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atom-avatar-app
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # External-API metadata DB (self-hosted Postgres service below).
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8093:3000"          # host 8093 -> Cloudflare route avatar.atom-farm.com
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  # Self-hosted PostgreSQL for the external-API metadata store. Internal only.
  postgres:
    image: postgres:16-alpine
    container_name: atom-avatar-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - atom_avatar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Self-hosted S3-compatible object storage. Internal only (no published ports);
  # the app reads/writes via the compose network and serves files publicly through
  # its own /api/files/<key> route.
  minio:
    image: minio/minio:latest
    container_name: atom-avatar-minio
    command: server /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - atom_avatar_minio_data:/data
    restart: unless-stopped

volumes:
  atom_avatar_pg_data:
  atom_avatar_minio_data:
