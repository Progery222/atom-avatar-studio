# Production stack for self-hosted server (atom@10.20.87.230).
# Deploys only the Next.js app + a dedicated Tailscale node (sidecar) that
# exposes it publicly via Funnel at https://atom-avatar.<tailnet>.ts.net.
# The Python worker (worker/) is intentionally not deployed here.
#
# Usage on server:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Requires a .env file in this directory (see .env.example), including TS_AUTHKEY.

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: atom-avatar-ts
    hostname: atom-avatar
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=atom-avatar
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - atom_avatar_ts_state:/var/lib/tailscale
      - ./deploy/tailscale-serve.json:/config/serve.json:ro
    cap_add:
      - net_admin
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atom-avatar-app
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    # Share the Tailscale container's network namespace so Funnel can reach the
    # app at 127.0.0.1:3000. Do NOT add a `ports:` block here — declare ports on
    # the `tailscale` service instead if host access is ever needed.
    network_mode: service:tailscale
    depends_on:
      - tailscale
      - minio
    restart: unless-stopped

  # Self-hosted S3-compatible object storage. Internal only (no published ports);
  # the app reads/writes via the compose network and serves files publicly through
  # its own /api/files/<key> route.
  minio:
    image: minio/minio:latest
    container_name: atom-avatar-minio
    command: server /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - atom_avatar_minio_data:/data
    restart: unless-stopped

volumes:
  atom_avatar_ts_state:
  atom_avatar_minio_data:
